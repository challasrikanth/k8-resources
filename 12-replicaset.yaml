apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  namespace: roboshop
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
spec:
  replicas: 3
  selector:
    matchlabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
template:
  metadata:
    lables:
      project: roboshop
      purpose: rs-demo
      tier: frontend
  spec:
    containers:
    - name: nginx
      image: nginx:stable-alpine3.23-perl